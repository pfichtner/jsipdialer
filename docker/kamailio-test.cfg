#!KAMAILIO
#
# Minimal Kamailio config for integration testing
#

debug=3
log_stderror=yes
memlog=1
log_facility=LOG_LOCAL0

fork=no
children=4

# listen on all interfaces
listen=udp:0.0.0.0:15060

# modules
loadmodule "sl.so"
loadmodule "tm.so"
loadmodule "rr.so"
loadmodule "pv.so"
loadmodule "maxfwd.so"
loadmodule "usrloc.so"
loadmodule "registrar.so"
loadmodule "textops.so"
loadmodule "xlog.so"
loadmodule "auth.so"

modparam("usrloc", "db_mode", 0)

modparam("registrar", "max_contacts", 1)
modparam("registrar", "default_expires", 3600)
modparam("registrar", "min_expires", 60)

# Simple static auth: username "caller" with password "pass"
modparam("auth", "secret", "testsecret")

# Main request routing
request_route {
    xlog("L_INFO", "=== INCOMING REQUEST: $rm from $fu to $ru\n");

    if (is_method("REGISTER")) {
        xlog("L_INFO", "=== REGISTER from $fu\n");
        if (!save("location")) {
            sl_reply_error();
        }
        exit;
    }

    if (is_method("INVITE")) {
        xlog("L_INFO", "=== INVITE from $fu to $ru\n");
        # Challenge INVITEs with 401 to simulate real-world proxy behavior
        # (e.g. FritzBox). On the first INVITE (no Authorization header),
        # send 401. mjSIP re-sends with auth and the INVITE is then relayed.
        # This tests that our fallback promiscuous listener detects final
        # responses even when mjSIP's transaction listener fails to match
        # responses to the re-INVITE.
        # Challenge INVITEs with 401 to simulate real-world proxy behavior
        # (e.g. FritzBox). On the first INVITE (no Authorization header),
        # send 401. mjSIP re-sends with auth and the INVITE is then relayed.
        # This tests that our fallback promiscuous listener detects final
        # responses even when mjSIP's transaction listener fails to match
        # responses to the re-INVITE.
        if (is_present_hf("Authorization")) {
            xlog("L_INFO", "=== INVITE has Authorization, relaying\n");
        } else if (is_present_hf("Proxy-Authorization")) {
            xlog("L_INFO", "=== INVITE has Proxy-Authorization, relaying\n");
        } else {
            xlog("L_INFO", "=== Challenging INVITE with 401\n");
            append_to_reply("WWW-Authenticate: Digest realm=\"127.0.0.1\",nonce=\"abc123\",algorithm=MD5\r\n");
            send_reply("401", "Unauthorized");
            exit;
        }
        xlog("L_INFO", "=== INVITE has Authorization, relaying\n");
        if (!lookup("location")) {
            xlog("L_INFO", "=== User not found in location\n");
            sl_send_reply("404", "Not Found");
            exit;
        }
        record_route();
        xlog("L_INFO", "=== Forwarding INVITE to $du\n");
        t_on_reply("MANAGE_REPLY");
        if (!t_relay()) {
            sl_reply_error();
        }
        exit;
    }

    if (is_method("ACK")) {
        if (t_check_trans()) {
            t_relay();
        } else {
            # ACK for 2xx is a new transaction — forward statelessly
            forward();
        }
        exit;
    }

    if (is_method("CANCEL|BYE")) {
        if (t_check_trans())
            t_relay();
        exit;
    }

    sl_send_reply("405", "Method Not Allowed");
}

onreply_route[MANAGE_REPLY] {
    xlog("L_INFO", "=== REPLY: $rs $rr from $si:$sp\n");
}
