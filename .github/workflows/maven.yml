name: GraalVM Native Image builds

on: [push]

permissions:
  contents: read
  checks: write

jobs:
  build:
    name: jsipdialer on ${{ matrix.os }}
    env:
      MAVEN_PKG_TOKEN: ${{ secrets.MAVEN_PKG_TOKEN }}
    runs-on: ${{ matrix.os == 'darwin' && 'macos-latest' || matrix.os == 'linux' && 'ubuntu-latest' || matrix.os == 'windows' && 'windows-latest' }}
    strategy:
      matrix:
        os: [linux]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: MAVEN_PKG_TOKEN
      - uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          native-image-job-reports: 'true'
      - name: Install UPX
        shell: bash
        run: |
          if [[ "${{ matrix.os }}" == 'linux' ]]; then
            sudo apt-get update && sudo apt-get install -y upx musl-tools build-essential zlib1g-dev
          elif [[ "${{ matrix.os }}" == 'darwin' ]]; then
            brew install upx
          elif [[ "${{ matrix.os }}" == 'windows' ]]; then
            choco install upx -y
          fi
      - name: Build with Maven
        run: ./mvnw verify
      - name: Publish Test Report
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: JUnit Tests (${{ matrix.os }})
          path: target/*-reports/TEST-*.xml
          reporter: java-junit
      - name: Compress and move files
        run: |
          mkdir -p publish-artifacts
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            tarname="${GITHUB_REF#refs/tags/}_${{ matrix.os }}"
          else
            tarname="${{ matrix.os }}"
          fi
          (cd target && tar -czf "../publish-artifacts/jsipdialer_${tarname}.tar.gz" jsipdialer jsipdialer-*.jar)
      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: publish-artifacts-${{ matrix.os }}
          path: "publish-artifacts/*"

  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs: build

    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v8
        with:
          merge-multiple: true

      - name: Display structure of downloaded files
        run: ls -R

      - name: Create Release
        id: create_release
        uses: ncipollo/release-action@339a81892b84b6eeb0f6e744e4574d79d0d9b8dd # v1.21.0
        if: startsWith(github.ref, 'refs/tags/')
        with:
          artifacts: "jsipdialer_*.tar.gz"
          makeLatest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

